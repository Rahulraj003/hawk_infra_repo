apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-hello-world
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hawk-apps
  
  # Source: Git repository with Helm chart
  source:
    repoURL: https://github.com/Rahulraj003/hawk_infra_repo
    targetRevision: develop
    path: applications/java-hello-world/helm-chart
    helm:
      valueFiles:
        - values.yaml
      # Override values for GitOps - always use latest image
      values: |
        image:
          repository: rahulraj003/java-hello-world
          tag: latest
          pullPolicy: Always
        service:
          type: NodePort
          nodePort: 30444
  
  # Destination: hawk-apps namespace
  destination:
    server: https://kubernetes.default.svc
    namespace: hawk-apps
  
  # Sync policy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
  
  # Revision history
  revisionHistoryLimit: 5
