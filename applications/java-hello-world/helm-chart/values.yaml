# Default values for java-hello-world
replicaCount: 2  # Minimum 2 replicas for zero-downtime deployments

image:
  repository: java-hello-world  # Will be overridden by pipeline
  tag: "latest"                 # Will be overridden by pipeline
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# Zero-downtime deployment configuration
deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0        # Never have 0 pods available
    maxSurge: 1              # Allow 1 extra pod during updates

autoscaling:
  enabled: false
  minReplicas: 2  # Minimum 2 replicas for zero-downtime
  maxReplicas: 2  # Fixed replicas for consistent performance
  targetCPUUtilizationPercentage: 80

service:
  type: NodePort
  port: 8080
  nodePort: 30444  # This will map to port 8445 on your Mac (avoiding conflict with existing 8081:30080 and 8444:30443)

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Health checks for zero-downtime
livenessProbe:
  enabled: true
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}
