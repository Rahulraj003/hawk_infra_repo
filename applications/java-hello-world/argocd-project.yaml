apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hawk-apps
  namespace: argocd
  labels:
    app.kubernetes.io/name: hawk-apps
    app.kubernetes.io/part-of: argocd
spec:
  description: Hawk Applications Project for Java and other applications
  
  # Source repositories allowed
  sourceRepos:
    - 'https://github.com/Rahulraj003/hawk_infra_repo.git'
  
  # Destination clusters and namespaces
  destinations:
    - namespace: hawk-apps
      server: https://kubernetes.default.svc
    - namespace: default
      server: https://kubernetes.default.svc
  
  # Allowed Kubernetes resources
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRole
    - group: 'rbac.authorization.k8s.io'
      kind: ClusterRoleBinding
  
  # Allowed namespaced resources
  namespaceResourceWhitelist:
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: ''
      kind: Service
    - group: ''
      kind: ServiceAccount
    - group: 'apps'
      kind: Deployment
    - group: 'apps'
      kind: StatefulSet
    - group: 'networking.k8s.io'
      kind: Ingress
    - group: 'batch'
      kind: Job
    - group: 'batch'
      kind: CronJob
  
  # Allowed Helm charts
  sourceNamespaces:
    - argocd
  
  # Sync windows (optional - for production deployments)
  syncWindows:
    - name: allow-all
      schedule: '0 0 * * *'
      duration: 24h
      applications:
        - '*'
      namespaces:
        - '*'
      manualSync: true
      timezone: 'UTC'
