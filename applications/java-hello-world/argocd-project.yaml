apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hawk-apps
  namespace: argocd
spec:
  description: Applications for hawk-apps namespace
  
  # Source repositories
  sourceRepos:
  - 'https://github.com/Rahulraj003/hawk_infra_repo'
  
  # Destination clusters and namespaces
  destinations:
  - namespace: hawk-apps
    server: https://kubernetes.default.svc
  
  # Resource whitelist
  clusterResourceWhitelist:
  - group: ''
    kind: Namespace
  
  namespaceResourceWhitelist:
  - group: ''
    kind: ConfigMap
  - group: ''
    kind: Secret
  - group: ''
    kind: Service
  - group: apps
    kind: Deployment
  - group: apps
    kind: ReplicaSet
  - group: autoscaling
    kind: HorizontalPodAutoscaler
  - group: networking.k8s.io
    kind: Ingress
  - group: ''
    kind: PersistentVolumeClaim
  - group: ''
    kind: ServiceAccount
  - group: rbac.authorization.k8s.io
    kind: Role
  - group: rbac.authorization.k8s.io
    kind: RoleBinding
