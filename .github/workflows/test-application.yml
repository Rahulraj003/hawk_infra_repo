name: Test Java Application

on:
  pull_request:
    branches: [ develop ]
    paths:
      - 'applications/**'
      - '.github/workflows/test-application.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}-java-hello-world

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build and Test with Gradle
      run: |
        cd applications/java-hello-world
        echo "Building and testing application..."
        
        # Build includes tests by default
        ./gradlew build
        
        echo ""
        echo "✅ Build completed successfully!"
        echo "✅ All tests passed!"
        echo "✅ JAR file created in build/libs/"
        
        # Show test summary
        echo ""
        echo "📊 Test Summary:"
        ./gradlew test --info | grep -E "(BUILD SUCCESSFUL|Tests run|BUILD FAILED)" || echo "Tests completed"
        
    - name: Build Docker image (without push)
      run: |
        cd applications/java-hello-world
        echo "Building Docker image for testing..."
        docker build -t test-image .
        echo "Docker image built successfully for testing"
        
    - name: Test Summary
      run: |
        echo "✅ All tests passed!"
        echo "✅ Build successful!"
        echo "✅ Docker image built!"
        echo "🚫 No deployment (PR only)"
        echo "📝 Ready for review and merge"
