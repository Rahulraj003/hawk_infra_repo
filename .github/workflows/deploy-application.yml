name: Deploy Java Application

on:
  push:
    branches: [ develop ]
    paths:
      - 'applications/**'
      - '.github/workflows/deploy-application.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: java-hello-world

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build Application
      run: |
        cd applications/java-hello-world
        echo "Building application..."
        ./gradlew build -x test
        echo ""
        echo "✅ Build completed successfully!"
        echo "✅ JAR file created in build/libs/"
        
    - name: Run Simple Tests
      run: |
        cd applications/java-hello-world
        echo "Running simple tests..."
        ./gradlew run --args="test"
        echo ""
        echo "✅ Simple tests completed!"
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push Docker image
      run: |
        cd applications/java-hello-world
        
        # Build the image
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        
        # Push the image
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        
        # Also tag as latest
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
        
        echo "✅ Docker image built and pushed successfully!"
        echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        
    - name: Prepare Helm chart values
      if: github.ref == 'refs/heads/develop'
      run: |
        echo "Preparing Helm chart values for deployment..."
        echo "New image tag: ${{ github.sha }}"
        echo "New image repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
        
        echo "✅ Image values prepared for deployment job"
        
    - name: Set Job Outputs
      if: github.ref == 'refs/heads/develop'
      id: image-info
      run: |
        echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        echo "image_repository=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" >> $GITHUB_OUTPUT
        echo "✅ Job outputs set:"
        echo "   image_tag: ${{ github.sha }}"
        echo "   image_repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
        
  deploy-to-kubernetes:
    needs: build-and-test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
        
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'
        
    - name: Smart Resource Cleanup (Only When Needed)
      run: |
        echo "=== Smart Resource Cleanup ==="
        
        # Check if namespace exists and has resources
        if kubectl get namespace hawk-apps >/dev/null 2>&1; then
          echo "Namespace hawk-apps exists, checking resource health..."
          
          # Check if there are any problematic resources (ImagePullBackOff, CrashLoopBackOff, etc.)
          PROBLEMATIC_PODS=$(kubectl get pods -n hawk-apps --no-headers 2>/dev/null | grep -E "(ImagePullBackOff|CrashLoopBackOff|Error|Pending)" | wc -l || echo "0")
          
          if [ "$PROBLEMATIC_PODS" -gt "0" ]; then
            echo "⚠️ Found $PROBLEMATIC_PODS problematic pods, cleaning up..."
            
            # Only clean up problematic resources
            kubectl delete pods -n hawk-apps --field-selector=status.phase!=Running --force --grace-period=0 || true
            kubectl delete pods -n hawk-apps --field-selector=status.phase=Failed --force --grace-period=0 || true
            
            echo "✅ Problematic pods cleaned up"
          else
            echo "✅ All pods are healthy, no cleanup needed"
          fi
          
          # Check if namespace is stuck in Terminating state
          NAMESPACE_STATUS=$(kubectl get namespace hawk-apps -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
          if [ "$NAMESPACE_STATUS" = "Terminating" ]; then
            echo "⚠️ Namespace stuck in Terminating state, removing finalizers..."
            kubectl get namespace hawk-apps -o json | jq '.spec.finalizers = []' | kubectl replace --raw "/api/v1/namespaces/hawk-apps/finalize" -f - || true
            sleep 10
            echo "✅ Finalizers removed, namespace should be deleted"
          fi
        else
          echo "Namespace hawk-apps doesn't exist, will create fresh"
        fi
        
        # Only clean up ArgoCD Application if it's in a failed state
        echo "Checking ArgoCD Application status..."
        if kubectl get application java-hello-world -n argocd >/dev/null 2>&1; then
          APP_STATUS=$(kubectl get application java-hello-world -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
          if [ "$APP_STATUS" = "Degraded" ] || [ "$APP_STATUS" = "Missing" ]; then
            echo "⚠️ ArgoCD Application is in $APP_STATUS state, cleaning up..."
            kubectl delete application java-hello-world -n argocd --force --grace-period=0 || true
            sleep 5
          else
            echo "✅ ArgoCD Application is healthy ($APP_STATUS), no cleanup needed"
          fi
        else
          echo "ArgoCD Application doesn't exist, will create fresh"
        fi
        
    - name: Verify Docker Image Exists
      run: |
        echo "=== Verifying Docker Image Exists ==="
        
        # Get image details from job outputs
        IMAGE_TAG="${{ needs.build-and-test.outputs.image_tag }}"
        IMAGE_REPOSITORY="${{ needs.build-and-test.outputs.image_repository }}"
        
        echo "Checking image: $IMAGE_REPOSITORY:$IMAGE_TAG"
        
        # Since we're on self-hosted runner, verify image values are correct
        # rather than trying to pull (which might fail due to different environment)
        if [ -n "$IMAGE_TAG" ] && [ -n "$IMAGE_REPOSITORY" ]; then
          echo "✅ Image values are properly set:"
          echo "   Repository: $IMAGE_REPOSITORY"
          echo "   Tag: $IMAGE_TAG"
          
          # Verify the format looks correct
          if [[ "$IMAGE_REPOSITORY" =~ ^[a-zA-Z0-9_-]+/[a-zA-Z0-9_-]+$ ]]; then
            echo "✅ Image repository format is valid"
          else
            echo "⚠️ Warning: Image repository format might be unusual: $IMAGE_REPOSITORY"
          fi
          
          if [[ "$IMAGE_TAG" =~ ^[a-f0-9]{7,}$ ]]; then
            echo "✅ Image tag format is valid (commit SHA)"
          else
            echo "⚠️ Warning: Image tag format might be unusual: $IMAGE_TAG"
          fi
          
        else
          echo "❌ Error: Image values are not properly set"
          echo "IMAGE_TAG: $IMAGE_TAG"
          echo "IMAGE_REPOSITORY: $IMAGE_REPOSITORY"
          exit 1
        fi
        
        # Log the image that will be deployed
        echo "✅ Will deploy image: $IMAGE_REPOSITORY:$IMAGE_TAG"
        echo "✅ Docker image verification completed successfully!"
        
    - name: Deploy Application with Updated Image
      run: |
        echo "Deploying application with new image..."
        echo "Image Tag: ${{ needs.build-and-test.outputs.image_tag }}"
        echo "Image Repository: ${{ needs.build-and-test.outputs.image_repository }}"
        
        # Verify image values are set
        if [ -z "${{ needs.build-and-test.outputs.image_tag }}" ] || [ -z "${{ needs.build-and-test.outputs.image_repository }}" ]; then
          echo "❌ Error: Image values are not set properly"
          echo "IMAGE_TAG: ${{ needs.build-and-test.outputs.image_tag }}"
          echo "IMAGE_REPOSITORY: ${{ needs.build-and-test.outputs.image_repository }}"
          exit 1
        fi
        
        echo "✅ Image values verified:"
        echo "   Repository: ${{ needs.build-and-test.outputs.image_repository }}"
        echo "   Tag: ${{ needs.build-and-test.outputs.image_tag }}"
        
        # Deploy using Helm with intelligent resource handling
        cd applications/java-hello-world/helm-chart
        
        # Check if there's an existing release and if it's healthy
        echo "Checking existing Helm release status..."
        if helm list -n hawk-apps | grep -q "java-hello-world"; then
          # Check if the release is in a failed state
          RELEASE_STATUS=$(helm status java-hello-world -n hawk-apps -o json 2>/dev/null | jq -r '.info.status' || echo "unknown")
          
          if [ "$RELEASE_STATUS" = "failed" ] || [ "$RELEASE_STATUS" = "deployed" ]; then
            echo "✅ Existing release is healthy ($RELEASE_STATUS), proceeding with upgrade"
          else
            echo "⚠️ Release is in $RELEASE_STATUS state, uninstalling first..."
            helm uninstall java-hello-world -n hawk-apps || true
            sleep 15  # Wait for cleanup
          fi
        else
          echo "No existing release found, will install fresh"
        fi
        
        # Use upgrade --install to handle both new and existing deployments
        # --force ensures existing resources are properly managed
        # --atomic ensures rollback on failure
        echo "Installing/upgrading application..."
        helm upgrade --install java-hello-world . \
          --namespace hawk-apps \
          --create-namespace \
          --force \
          --atomic \
          --timeout 10m \
          --set image.tag="${{ needs.build-and-test.outputs.image_tag }}" \
          --set image.repository="${{ needs.build-and-test.outputs.image_repository }}" \
          --set service.type=NodePort \
          --set service.nodePort=30444
        
        echo "✅ Application deployed/updated successfully!"
        echo "✅ Helm will handle existing resources intelligently"
        echo "✅ Future version updates will work seamlessly"
        
    - name: Create ArgoCD Project (if not exists)
      run: |
        echo "Creating ArgoCD project for hawk-apps..."
        kubectl apply -f applications/java-hello-world/argocd-project.yaml || echo "Project already exists"
        
    - name: Create ArgoCD Application (if not exists)
      run: |
        echo "Creating ArgoCD application for automatic sync..."
        kubectl apply -f applications/java-hello-world/argocd-application.yaml || echo "Application already exists"
        
    - name: Verify ArgoCD Application
      run: |
        echo "Checking ArgoCD application status..."
        kubectl get application java-hello-world -n argocd
        echo ""
        echo "ArgoCD application details:"
        kubectl describe application java-hello-world -n argocd
        
    - name: Verify Zero-Downtime Deployment
      run: |
        echo "=== Verifying Zero-Downtime Deployment ==="
        
        # Wait for deployment to be ready
        kubectl wait --for=condition=available --timeout=300s deployment/java-hello-world -n hawk-apps
        
        # Verify we have the required replicas for zero-downtime
        REPLICAS=$(kubectl get deployment java-hello-world -n hawk-apps -o jsonpath='{.spec.replicas}')
        AVAILABLE=$(kubectl get deployment java-hello-world -n hawk-apps -o jsonpath='{.status.availableReplicas}')
        
        echo "Required replicas: $REPLICAS"
        echo "Available replicas: $AVAILABLE"
        
        if [ "$AVAILABLE" -ge "$REPLICAS" ]; then
          echo "✅ Zero-downtime deployment successful!"
          echo "✅ Application remains available during updates"
        else
          echo "❌ Deployment not ready for zero-downtime"
          exit 1
        fi
        
        echo "✅ Zero-downtime deployment verified successfully!"
        
    - name: Verify Deployment Resources
      run: |
        echo "=== Verifying All Resources ==="
        
        # Wait for namespace to be ready
        kubectl wait --for=condition=active --timeout=30s namespace/hawk-apps
        
        # Wait for deployment to be ready
        kubectl wait --for=condition=available --timeout=300s deployment/java-hello-world -n hawk-apps
        
        # Wait for service to be ready
        kubectl wait --for=condition=ready --timeout=30s service/java-hello-world -n hawk-apps
        
        echo "✅ All resources are ready and healthy!"
        
    - name: Show Deployment Status
      run: |
        echo "=== Deployment Status ==="
        kubectl get deployment java-hello-world -n hawk-apps
        echo ""
        echo "=== Pod Status ==="
        kubectl get pods -n hawk-apps -l app.kubernetes.io/name=java-hello-world
        echo ""
        echo "=== Service Status ==="
        kubectl get services -n hawk-apps -l app.kubernetes.io/name=java-hello-world
        echo ""
        echo "=== Namespace Status ==="
        kubectl get namespace hawk-apps
