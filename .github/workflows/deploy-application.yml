name: Deploy Java Application

on:
  push:
    branches: [ develop ]
    paths:
      - 'applications/**'
      - '.github/workflows/deploy-application.yml'

env:
  REGISTRY: docker.io
  IMAGE_NAME: java-hello-world

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build Application
      run: |
        cd applications/java-hello-world
        echo "Building application..."
        ./gradlew build -x test
        echo ""
        echo "✅ Build completed successfully!"
        echo "✅ JAR file created in build/libs/"
        
    - name: Run Simple Tests
      run: |
        cd applications/java-hello-world
        echo "Running simple tests..."
        ./gradlew run --args="test"
        echo ""
        echo "✅ Simple tests completed!"
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push Docker image
      run: |
        cd applications/java-hello-world
        
        # Build the image
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        
        # Push the image
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        
        # Also tag as latest
        docker tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
        
        echo "✅ Docker image built and pushed successfully!"
        echo "Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
        
    - name: Prepare Helm chart values
      if: github.ref == 'refs/heads/develop'
      run: |
        echo "Preparing Helm chart values for deployment..."
        echo "New image tag: ${{ github.sha }}"
        echo "New image repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
        echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        echo "IMAGE_REPOSITORY=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" >> $GITHUB_ENV
        
  deploy-to-kubernetes:
    needs: build-and-test
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
        
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: 'latest'
        
    - name: Create ArgoCD Project (if not exists)
      run: |
        echo "Creating ArgoCD project for hawk-apps..."
        kubectl apply -f applications/java-hello-world/argocd-project.yaml || echo "Project already exists"
        
    - name: Create ArgoCD Application (if not exists)
      run: |
        echo "Creating ArgoCD application for automatic sync..."
        kubectl apply -f applications/java-hello-world/argocd-application.yaml || echo "Application already exists"
        
    - name: Clean Up Corrupted Resources (if any)
      run: |
        echo "Checking for any corrupted or orphaned resources..."
        
        # Check if namespace exists and has resources
        if kubectl get namespace hawk-apps >/dev/null 2>&1; then
          echo "Namespace hawk-apps exists, checking for resources..."
          
          # Check for orphaned resources without proper Helm ownership
          ORPHANED_RESOURCES=$(kubectl get all -n hawk-apps --no-headers 2>/dev/null | grep -v "helm.sh/release" || true)
          
          if [ -n "$ORPHANED_RESOURCES" ]; then
            echo "Found orphaned resources, cleaning them up..."
            kubectl delete all --all -n hawk-apps --force --grace-period=0 || true
            echo "✅ Orphaned resources cleaned up"
          else
            echo "✅ No orphaned resources found"
          fi
        else
          echo "Namespace hawk-apps doesn't exist, will create fresh"
        fi
        
    - name: Deploy Application with Updated Image
      run: |
        echo "Deploying application with new image..."
        echo "Image Tag: ${{ env.IMAGE_TAG }}"
        echo "Image Repository: ${{ env.IMAGE_REPOSITORY }}"
        
        # Deploy using Helm with intelligent resource handling
        cd applications/java-hello-world/helm-chart
        
        # Use upgrade --install to handle both new and existing deployments
        # --force ensures existing resources are properly managed
        helm upgrade --install java-hello-world . \
          --namespace hawk-apps \
          --create-namespace \
          --force \
          --set image.tag="${{ env.IMAGE_TAG }}" \
          --set image.repository="${{ env.IMAGE_REPOSITORY }}" \
          --set service.type=NodePort \
          --set service.nodePort=30444
        
        echo "✅ Application deployed/updated successfully!"
        echo "✅ Helm will handle existing resources intelligently"
        echo "✅ Future version updates will work seamlessly"
        
    - name: Verify ArgoCD Application
      run: |
        echo "Checking ArgoCD application status..."
        kubectl get application java-hello-world -n argocd
        echo ""
        echo "ArgoCD application details:"
        kubectl describe application java-hello-world -n argocd
        
    - name: Wait for ArgoCD to Sync
      run: |
        echo "Waiting for ArgoCD to automatically sync the application..."
        kubectl wait --for=condition=healthy --timeout=300s application/java-hello-world -n argocd
          
    - name: Verify Zero-Downtime Deployment
      run: |
        echo "=== Verifying Zero-Downtime Deployment ==="
        
        # Wait for deployment to be ready
        kubectl wait --for=condition=available --timeout=300s deployment/java-hello-world -n hawk-apps
        
        # Verify we have the required replicas for zero-downtime
        REPLICAS=$(kubectl get deployment java-hello-world -n hawk-apps -o jsonpath='{.spec.replicas}')
        AVAILABLE=$(kubectl get deployment java-hello-world -n hawk-apps -o jsonpath='{.status.availableReplicas}')
        
        echo "Required replicas: $REPLICAS"
        echo "Available replicas: $AVAILABLE"
        
        if [ "$AVAILABLE" -ge "$REPLICAS" ]; then
          echo "✅ Zero-downtime deployment successful!"
          echo "✅ Application remains available during updates"
        else
          echo "❌ Deployment not ready for zero-downtime"
          exit 1
        fi
        
        echo "✅ Zero-downtime deployment verified successfully!"
        
    - name: Verify Deployment Resources
      run: |
        echo "=== Verifying All Resources ==="
        
        # Wait for namespace to be ready
        kubectl wait --for=condition=active --timeout=30s namespace/hawk-apps
        
        # Wait for deployment to be ready
        kubectl wait --for=condition=available --timeout=300s deployment/java-hello-world -n hawk-apps
        
        # Wait for service to be ready
        kubectl wait --for=condition=ready --timeout=30s service/java-hello-world -n hawk-apps
        
        echo "✅ All resources are ready and healthy!"
        
    - name: Show Deployment Status
      run: |
        echo "=== Deployment Status ==="
        kubectl get deployment java-hello-world -n hawk-apps
        echo ""
        echo "=== Pod Status ==="
        kubectl get pods -n hawk-apps -l app.kubernetes.io/name=java-hello-world
        echo ""
        echo "=== Service Status ==="
        kubectl get services -n hawk-apps -l app.kubernetes.io/name=java-hello-world
        echo ""
        echo "=== Namespace Status ==="
        kubectl get namespace hawk-apps
