name: Deploy Infrastructure (ArgoCD)

on:
  push:
    branches: [ develop ]
    paths: [ 'infrastructure/**' ]  # Only trigger when infrastructure changes
  workflow_dispatch:  # Manual trigger option

jobs:
  deploy-argocd:
    runs-on: self-hosted  # Uses your local Mac runner where k3d cluster is running
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check Terraform version
      run: |
        echo "=== Terraform Version ==="
        terraform version
        
    - name: Verify cluster access
      run: |
        echo "=== Verifying Cluster Access ==="
        kubectl cluster-info
        kubectl get nodes
        echo "✅ Cluster access verified"
        
    - name: Navigate to Terraform directory
      run: |
        echo "=== Setting up Terraform Directory ==="
        cd infrastructure/terraform
        pwd
        ls -la
        
    - name: Terraform Init
      run: |
        echo "=== Initializing Terraform ==="
        cd infrastructure/terraform
        terraform init
        echo "✅ Terraform initialized successfully"
        
    - name: Terraform Apply
      run: |
        echo "=== Applying Terraform Changes ==="
        cd infrastructure/terraform
        terraform apply -auto-approve
        echo "✅ Terraform apply completed"
        
    - name: Verify ArgoCD Deployment
      run: |
        echo "=== Verifying ArgoCD Deployment ==="
        kubectl get pods -n argocd
        kubectl get svc -n argocd
        kubectl get namespace argocd
        
        # Wait for pods to be ready
        echo "Waiting for ArgoCD pods to be ready..."
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-server -n argocd --timeout=120s
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-application-controller -n argocd --timeout=120s
        kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=argocd-repo-server -n argocd --timeout=120s
        
        echo "✅ ArgoCD deployment verified"
        
    - name: Show ArgoCD Access Information
      run: |
        echo "=== ARGOCD ACCESS INFORMATION ==="
        echo "Namespace: argocd"
        echo "Service: argocd-server"
        echo "NodePort: 30080"
        echo "External URL: http://localhost:8081"
        echo "Username: admin"
        echo "Password: admin123"
        echo ""
        echo "=== Current ArgoCD Status ==="
        kubectl get pods -n argocd -o wide
        kubectl get svc -n argocd
        
    - name: Test ArgoCD Connection
      run: |
        echo "=== Testing ArgoCD Connection ==="
        # Check if ArgoCD server is responding
        kubectl get pods -n argocd -l app.kubernetes.io/name=argocd-server
        
        # Show recent events
        echo "Recent ArgoCD events:"
        kubectl get events -n argocd --sort-by='.lastTimestamp' | tail -10
        
        echo "✅ ArgoCD connection test completed"
        
    - name: Verify ArgoCD Credentials
      run: |
        echo "=== VERIFYING ARGOCD CREDENTIALS ==="
        echo ""
        echo "🔍 Checking username configuration:"
        # ArgoCD username is hardcoded as 'admin' - always available
        USERNAME="admin"
        echo "✅ Username: admin (Hardcoded by ArgoCD - always available)"
        
        # Verify Helm values are set correctly
        HELM_USERNAME=$(helm get values argocd -n argocd -o json | jq -r '.configs.cm.accounts.admin.username // "NOT_SET"')
        if [ "$HELM_USERNAME" = "admin" ]; then
          echo "✅ Username confirmed in Helm values: $HELM_USERNAME"
        else
          echo "ℹ️  Username not in Helm values (normal - ArgoCD hardcodes it)"
        fi
        
        echo ""
        echo "🔍 Checking password configuration:"
        # ArgoCD auto-generates password - check if it exists
        PASSWORD=$(kubectl -n argocd get secret argocd-secret -o jsonpath="{.data.admin\\.password}" | base64 -d 2>/dev/null || echo "PASSWORD_NOT_FOUND")
        if [ "$PASSWORD" != "PASSWORD_NOT_FOUND" ] && [ -n "$PASSWORD" ]; then
          echo "✅ Password: [GENERATED] (Auto-generated by ArgoCD)"
          echo "ℹ️  Note: Password is auto-generated, not the configured value"
        else
          echo "❌ Password: Not found or empty"
          echo "Expected: Auto-generated password, Got: $PASSWORD"
        fi
        
        echo ""
        echo "🔍 Complete secret data:"
        kubectl -n argocd get secret argocd-secret -o yaml | grep -A 10 "data:"
        
        echo ""
        if [ "$USERNAME" = "admin" ] && [ "$PASSWORD" != "PASSWORD_NOT_FOUND" ] && [ -n "$PASSWORD" ]; then
          echo "🎉 CREDENTIALS VERIFICATION PASSED!"
          echo "✅ Username: admin"
          echo "✅ Password: [GENERATED] (Auto-generated by ArgoCD)"
          echo "✅ ArgoCD login should work perfectly"
          echo ""
          echo "🔑 TO GET THE ACTUAL PASSWORD, RUN THIS COMMAND:"
          echo "kubectl -n argocd get secret argocd-secret -o jsonpath=\"{.data.admin\\.password}\" | base64 -d"
          echo ""
          echo "📋 LOGIN CREDENTIALS:"
          echo "Username: admin"
          echo "Password: [Run the command above to get it]"
        else
          echo "❌ CREDENTIALS VERIFICATION FAILED!"
          echo "❌ Check the configuration and redeploy"
          exit 1
        fi
        
    - name: Manual State File Management
      run: |
        echo "=== MANUAL STATE FILE MANAGEMENT ==="
        echo "✅ ArgoCD deployment completed successfully"
        echo ""
        echo "📁 State file location: infrastructure/terraform/terraform.tfstate"
        echo ""
        echo "💡 MANUAL STEP REQUIRED:"
        echo "   After this workflow completes, manually commit both files:"
        echo "   cd infrastructure/terraform"
        echo "   git add terraform.tfstate .terraform.lock.hcl"
        echo "   git commit -m 'Update Terraform state and lock file after ArgoCD deployment'"
        echo "   git push origin develop"
        echo ""
        echo "🔍 Current Terraform files status:"
        echo "State file:"
        if [ -f "infrastructure/terraform/terraform.tfstate" ]; then
          echo "✅ terraform.tfstate exists and is ready for manual commit"
          ls -la infrastructure/terraform/terraform.tfstate
        else
          echo "❌ terraform.tfstate not found - deployment may have failed"
          exit 1
        fi
        
        echo ""
        echo "Lock file:"
        if [ -f "infrastructure/terraform/.terraform.lock.hcl" ]; then
          echo "✅ .terraform.lock.hcl exists and is ready for manual commit"
          ls -la infrastructure/terraform/.terraform.lock.hcl
        else
          echo "⚠️  .terraform.lock.hcl not found - will be created during terraform init"
        fi
        
    - name: Deployment Summary
      run: |
        echo "=== DEPLOYMENT SUMMARY ==="
        echo "✅ Infrastructure deployment completed successfully"
        echo "✅ ArgoCD is now running in your k3d cluster"
        echo "✅ Access ArgoCD at: http://localhost:8081"
        echo "✅ Use admin/[auto-generated-password] to login"
        echo "💡 Get password with: kubectl -n argocd get secret argocd-secret -o jsonpath=\"{.data.admin\\.password}\" | base64 -d"
        echo "📝 Terraform state file ready for manual commit"
        echo ""
        echo "Next steps:"
        echo "1. Access ArgoCD UI at http://localhost:8081"
        echo "2. Add your Git repositories as sources"
        echo "3. Create applications for your workloads"
        echo "4. Set up GitOps workflows"
